name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Deterministic checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CI: "true"
      TEMIS_GITHUB_FETCH_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Validate CMS seed
        run: pnpm cms:seed:validate

      - name: Check content quality
        run: pnpm content:check

      - name: Type check
        run: pnpm type-check

      - name: Build static site offline
        run: pnpm build:offline

      - name: Check graph navigation
        run: pnpm --filter @temis/site check:graph
